<!doctype html>
<html>
<style>
    body {
        font-family: Arial;
        background: #f4f6f8;
        padding: 40px;
    }

    .card {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    button {
        padding: 10px 15px;
        background: #2d7ff9;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #1f5fd1;
    }
</style>

<head>
    <meta charset="utf-8">
    <title>Start Order</title>
</head>

<body>
    <h1>Start New Order</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <ul>
        {% for m in messages %}<li>{{ m }}</li>{% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <form method="post">
        <label>First name:</label>
        <input name="first_name" required><br><br>

        <label>Last name:</label>
        <input name="last_name" required><br><br>

        <label>Delivery address:</label>
        <input name="delivery_address" required style="width: 320px;"><br><br>

        <label>Restaurant:</label>
        <select name="restaurant_id" required>
            {% for r in restaurants %}
            <option value="{{ r[0] }}">{{ r[0] }} — {{ r[1] }} ({{ r[2] }})</option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Continue to Menu</button>
    </form>

    <p><a href="{{ url_for('home') }}">Back</a></p>
</body>

</html>
