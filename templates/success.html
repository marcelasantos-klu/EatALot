<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EatALot - Success</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #fff;
            --text: #0f172a;
            --muted: #64748b;
            --brand: #2d7ff9;
            --brand2: #1f5fd1;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 34px 18px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .brand {
            font-weight: 900;
            letter-spacing: .02em;
        }

        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .05);
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 22px;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--brand2);
        }

        ul {
            margin: 10px 0 0 18px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="brand">EatALot</div>
            <div class="nav">
                <a href="/">Dashboard</a>
                <a href="/restaurants">New Order</a>
                <a href="/manager">Manager</a>
            </div>
        </div>

        <div class="card">
            <h1>Order {{ order_id }} completed</h1>
            <div class="muted">Payment processed and delivery finished.</div>

            <ul>
                <li>Payment is being processed... ✅ processed</li>
                <li>Assigning a courier... ✅ courier assigned</li>
                <li>Delivery status... ✅ delivered</li>
            </ul>

            <div style="margin-top:14px;">
                <a class="btn" href="/">Back to dashboard</a>
                <a class="btn" href="/restaurants" style="background:#10b981;">Place another order</a>
            </div>
        </div>
    </div>
</body>

</html>
