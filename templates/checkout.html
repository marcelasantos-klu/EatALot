<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EatALot - Checkout</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #fff;
            --text: #0f172a;
            --muted: #64748b;
            --brand: #2d7ff9;
            --brand2: #1f5fd1;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 34px 18px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .brand {
            font-weight: 900;
            letter-spacing: .02em;
        }

        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .05);
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 22px;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--brand2);
        }

        .radio {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .radio label {
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .total {
            font-size: 26px;
            font-weight: 900;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div class="brand">EatALot</div>
            <div class="nav">
                <a href="/">Dashboard</a>
                <a href="/restaurants">New Order</a>
                <a href="/manager">Manager</a>
            </div>
        </div>

        <div class="card">
            <h1>Checkout - Order {{ order_id }}</h1>
            <div class="muted">Choose payment method and confirm payment.</div>
            <div class="total">Total: €{{ '%.2f'|format(order_total) }}</div>
        </div>

        <div class="card">
            <form method="POST">
                <div class="muted"><strong>Payment method</strong></div>
                <div class="radio">
                    <label><input type="radio" name="payment_method" value="Card" required> Card</label>
                    <label><input type="radio" name="payment_method" value="PayPal"> PayPal</label>
                </div>

                <button class="btn" type="submit" style="margin-top:14px;">Pay now</button>
                <a class="btn" href="/menu/{{ order_id }}" style="margin-top:14px;background:#94a3b8;">Back to menu</a>
            </form>
        </div>
    </div>
</body>

</html>
